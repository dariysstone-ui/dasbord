<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 Дашборд обращений</title>
  <style>
    :root {
      --bg-main: #0b1120;
      --bg-panel: #1e293b;
      --border: #334155;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --success: #10b981;
      --success-bg: rgba(16,185,129,0.15);
      --danger: #ef4444;
      --danger-bg: rgba(239,68,68,0.15);
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--text-main);
      margin: 0; padding: 20px;
      font-size: 14px;
    }
    .container { max-width: 1600px; margin: 0 auto; }
    .setup-panel {
      background: var(--bg-panel);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }
    label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 12px; }
    input {
      width: 100%; padding: 8px;
      background: #162032; border: 1px solid var(--border);
      border-radius: 6px; color: white;
    }
    button {
      background: var(--accent); color: white; border: none;
      padding: 10px 20px; border-radius: 6px; cursor: pointer;
      font-weight: bold;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .loader-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(11, 17, 32, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .loader-overlay.active { display: flex; }
    .loader-spinner {
      width: 50px; height: 50px;
      border: 4px solid var(--border);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader-text { margin-top: 15px; color: var(--text-main); font-size: 16px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; }
    .tab-btn {
      background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-muted);
      padding: 8px 16px; border-radius: 6px; cursor: pointer; white-space: nowrap;
    }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
    .metric-card { background: var(--bg-panel); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
    .metric-val { font-size: 32px; font-weight: bold; color: var(--accent); margin-bottom: 5px; }
    .metric-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media(max-width: 1000px) { .dashboard-grid { grid-template-columns: 1fr; } .metrics-row { grid-template-columns: repeat(2, 1fr); } }
    .section-block { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .section-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: var(--text-muted); font-size: 11px; padding: 8px; border-bottom: 2px solid var(--border); }
    td { padding: 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .dyn-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    .dyn-good { background: var(--success-bg); color: var(--success); }
    .dyn-bad { background: var(--danger-bg); color: var(--danger); }
    .export-btn { background: var(--success); margin-top: 20px; width: 100%; }
    .export-excel-btn { background: #10b981; margin-top: 10px; width: 100%; }
    .omsu-filter { position: relative; }
    .omsu-select { width: 100%; padding: 8px; background: #162032; border: 1px solid var(--border); border-radius: 6px; color: white; cursor: pointer; }
    .omsu-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; max-height: 300px; overflow-y: auto; z-index: 1000; margin-top: 4px; }
    .omsu-dropdown.show { display: block; }
    .omsu-option { padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .omsu-option:hover { background: rgba(255,255,255,0.05); }
    .omsu-option input { width: auto; margin: 0; }
    .clear-filter { background: var(--danger); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-left: 8px; }
    .clickable-row { cursor: pointer; transition: background 0.2s; }
    .clickable-row:hover { background: rgba(255,255,255,0.05); }
    .expand-icon { display: inline-block; transition: transform 0.3s; margin-right: 8px; font-size: 12px; }
    .expanded .expand-icon { transform: rotate(90deg); }
    .fact-list { display: none; margin-top: 8px; background: #0f172a; border-radius: 8px; padding: 12px; border: 1px solid var(--border); }
    .fact-list.show { display: block; }
    .fact-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid #334155; line-height: 1.4; }
    .fact-item:last-child { border-bottom: none; }
    .fact-name { flex: 1; margin-right: 12px; }
    .fact-count { background: var(--bg-panel); padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; white-space: nowrap; min-width: 30px; text-align: center; }
    .omsu-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .omsu-tag { background: var(--bg-panel); color: var(--text-muted); padding: 2px 6px; border-radius: 4px; font-size: 10px; border: 1px solid var(--border); }
  </style>
</head>
<body>
<div class="loader-overlay" id="loaderOverlay">
  <div class="loader-spinner"></div>
  <div class="loader-text" id="loaderText">Подключение к Google Sheets...</div>
</div>

<div class="container">
  <div class="setup-panel">
    <h2 style="margin:0; color:white;">📊 Дашборд обращений</h2>
    <div class="form-grid">
      <div><label>Период: с</label><input type="date" id="startDate"></div>
      <div><label>Период: по</label><input type="date" id="endDate"></div>
      <div><label>Сравнение: с</label><input type="date" id="compStartDate"></div>
      <div><label>Сравнение: по</label><input type="date" id="compEndDate"></div>
      <div class="omsu-filter">
        <label>Фильтр по ОМСУ</label>
        <div class="omsu-select" onclick="toggleOmsuDropdown()">
          <span id="omsuPlaceholder">Выберите ОМСУ</span>
        </div>
        <div class="omsu-dropdown" id="omsuDropdown"></div>
      </div>
      <button id="generateBtn" style="align-self:end;">🚀 Загрузить</button>
    </div>
    <button id="exportExcelBtn" class="export-excel-btn" style="display:none;">📥 Выгрузить в Excel</button>
  </div>
  <div id="dashboardContainer" style="display:none;">
    <div class="tabs" id="tabsNav"></div>
    <div id="tabsContent"></div>
    <button id="exportBtn" class="export-btn">📥 Экспорт в HTML</button>
  </div>
</div>

<script>
const OMSU_LIST = ['Долгопрудный','Подольск','Наро-Фоминский','Щелково','Павлово-Посадский','Люберцы','Истра','Мытищи','Домодедово','Химки','Электросталь','Красногорск','Жуковский','Ленинский','Реутов','Дмитровский','Котельники','Богородский','Солнечногорск','Ступино','Егорьевск','Луховицы','Балашиха','Воскресенск','Клин','Одинцовский','Дубна','Сергиево-Посадский','Раменский','Лобня','Рузский','Серпухов','Фрязино','Королёв','Пушкинский','Талдомский','Кашира','Коломна','Черноголовка','Лосино-Петровский','Чехов','Зарайск','Серебряные Пруды','Шатура','Власиха','Шаховская','Лыткарино','Орехово-Зуевский','Можайский','Краснознаменск','Волоколамский','Лотошино','Бронницы','Звездный городок','Молодежный','Восход'];

let currentData = null;
let currentPeriods = null;
let selectedOmsu = new Set();
let rawData = [];

function showLoader(text) {
  document.getElementById('loaderText').textContent = text || 'Загрузка данных...';
  document.getElementById('loaderOverlay').classList.add('active');
}
function hideLoader() {
  document.getElementById('loaderOverlay').classList.remove('active');
}
function initOmsuDropdown() {
  const dropdown = document.getElementById('omsuDropdown');
  dropdown.innerHTML = OMSU_LIST.sort().map(omsu => `
    <div class="omsu-option" onclick="toggleOmsu('${omsu}', event)">
      <input type="checkbox" id="omsu-${omsu.replace(/\s+/g,'-')}" value="${omsu}">
      <label for="omsu-${omsu.replace(/\s+/g,'-')}" style="margin:0; cursor:pointer;">${omsu}</label>
    </div>`).join('');
}
function toggleOmsuDropdown() { document.getElementById('omsuDropdown').classList.toggle('show'); }
function toggleOmsu(omsu, event) {
  event.stopPropagation();
  const checkbox = document.getElementById(`omsu-${omsu.replace(/\s+/g,'-')}`);
  if (checkbox.checked) selectedOmsu.add(omsu); else selectedOmsu.delete(omsu);
  updateOmsuDisplay();
}
function updateOmsuDisplay() {
  const placeholder = document.getElementById('omsuPlaceholder');
  const count = selectedOmsu.size;
  if (count === 0) placeholder.textContent = 'Выберите ОМСУ';
  else if (count === 1) placeholder.textContent = Array.from(selectedOmsu)[0];
  else placeholder.textContent = `Выбрано: ${count}`;
}
document.addEventListener('click', (e) => { if (!e.target.closest('.omsu-filter')) document.getElementById('omsuDropdown').classList.remove('show'); });

document.getElementById('generateBtn').onclick = async () => {
  const s = document.getElementById('startDate').value;
  const e = document.getElementById('endDate').value;
  const cs = document.getElementById('compStartDate').value;
  const ce = document.getElementById('compEndDate').value;
  
  if (!s || !e || !cs || !ce) { alert('Заполните все 4 поля с датами'); return; }

  showLoader('Подключение к Google Sheets...');
  document.getElementById('generateBtn').disabled = true;

  try {
    const res = await fetch('/api', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ start: s, end: e, compStart: cs, compEnd: ce, omsuFilter: Array.from(selectedOmsu) })
    });
    
    showLoader('Обработка данных...');
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    
    currentData = json.data;
    currentPeriods = { start: s, end: e, compStart: cs, compEnd: ce };
    rawData = json.rawData || [];
    
    if (currentData.length === 0) {
      alert('Нет данных за указанный период');
    } else {
      renderDashboard(currentData);
      document.getElementById('dashboardContainer').style.display = 'block';
      document.getElementById('exportExcelBtn').style.display = 'block';
    }
  } catch (err) {
    alert('Ошибка: ' + err.message);
  } finally {
    hideLoader();
    document.getElementById('generateBtn').disabled = false;
  }
};

function renderDashboard(data) {
  const nav = document.getElementById('tabsNav');
  const cont = document.getElementById('tabsContent');
  nav.innerHTML = ''; cont.innerHTML = '';
  
  data.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0?' active':'');
    btn.textContent = `${item.name} (${item.total})`;
    btn.onclick = () => switchTab(i);
    nav.appendChild(btn);
    
    const div = document.createElement('div');
    div.className = 'tab-content' + (i===0?' active':'');
    div.id = `tab-${i}`;
    
    // === ПОДТЕМЫ С РАСКРЫВАЮЩИМИСЯ ФАКТАМИ ===
    const htmlSub = item.subs.map((s, idx) => `
      <tr class="clickable-row" onclick="toggleSubFacts(this, ${i}, ${idx})" style="cursor:pointer;">
        <td><span class="expand-icon" id="sub-icon-${i}-${idx}">▶</span>${s.name}</td>
        <td>${s.count}</td>
        <td>${s.pctGroup}%</td>
        <td>${renderDyn(s.dynPct, s.dynAbs)}</td>
      </tr>
      <tr style="display:none;" id="sub-row-${i}-${idx}">
        <td colspan="4" style="padding:0 8px 8px 8px;">
          <div class="fact-list" id="sub-list-${i}-${idx}">
            <strong style="color:#94a3b8;font-size:11px;display:block;margin-bottom:8px;">📋 Факты в подтеме:</strong>
            ${s.facts.map(f => `<div class="fact-item"><span class="fact-name">${f[0]}</span><span class="fact-count">${f[1]}</span></div>`).join('')}
          </div>
        </td>
      </tr>
    `).join('');
    
    const htmlFact = item.facts.map(f => `<tr><td>${f.name}</td><td>${f.count}</td><td>${renderDyn(f.dynPct, f.dynAbs)}</td></tr>`).join('');
    const htmlOmsu = item.omsus.map(o => `<tr><td>${o.name}</td><td>${o.count}</td><td>${renderDyn(o.dynPct, o.dynAbs)}</td><td>${o.mainSub} <small style="color:#94a3b8">(${o.mainSubCnt}, ${o.mainSubPct}%)</small></td></tr>`).join('');
    
    const htmlMail = item.mails.map(m => `
      <tr class="clickable-row" onclick="toggleFacts(this)" style="cursor:pointer;">
        <td style="max-width:250px;"><span class="expand-icon">▶</span>${m.email}<br><small>${m.omsus.length > 0 ? m.omsus.join(', ') : '-'}</small></td>
        <td style="text-align:center;font-weight:bold;">${m.count}</td>
        <td style="color:#94a3b8;font-size:12px;">Нажмите</td>
      </tr>
      <tr style="display:none;"><td colspan="3" style="padding:0;"><div class="fact-list" style="padding:10px;background:#0f172a;border-radius:6px;margin-top:5px;"><strong>Факты:</strong>${m.facts.map(f => `<div class="fact-item"><span>${f[0]}</span><span>${f[1]}</span></div>`).join('')}</div></td></tr>
    `).join('');
    
    const htmlAddr = item.addrs.map(a => `<tr><td>${a.address}</td><td>${a.count}</td><td>${a.mainSub} <small style="color:#94a3b8">(${a.mainSubCnt}, ${a.mainSubPct}%)</small></td></tr>`).join('');
    
    div.innerHTML = `
      <div class="metrics-row">
        <div class="metric-card"><div class="metric-val">${item.total}</div><div class="metric-label">Всего обращений</div></div>
        <div class="metric-card"><div class="metric-val">${renderDyn(Math.round(((item.total-item.compTotal)/Math.max(item.compTotal,1))*100), item.total-item.compTotal)}</div><div class="metric-label">Динамика к периоду</div></div>
        <div class="metric-card"><div class="metric-val">${item.subs.length}</div><div class="metric-label">Подтем</div></div>
        <div class="metric-card"><div class="metric-val">${item.omsus.length}</div><div class="metric-label">ОМСУ</div></div>
      </div>
      <div class="dashboard-grid">
        <div class="section-block"><div class="section-title">📌 Топ-5 Подтем</div><table><tr><th>Подтема</th><th>Кол-во</th><th>%</th><th>Динамика</th></tr>${htmlSub}</table></div>
        <div class="section-block"><div class="section-title">⚠️ Топ-5 Фактов</div><table><tr><th>Факт</th><th>Кол-во</th><th>Динамика</th></tr>${htmlFact}</table></div>
        <div class="section-block"><div class="section-title">🏢 Топ-10 ОМСУ</div><table><tr><th>ОМСУ</th><th>Кол-во</th><th>Динамика</th><th>Гл. подтема</th></tr>${htmlOmsu}</table></div>
        <div class="section-block"><div class="section-title">✉️ Топ-10 Заявителей</div><table><tr><th>Email</th><th>Кол-во</th><th>Факты</th></tr>${htmlMail}</table></div>
        <div class="section-block" style="grid-column:1/-1"><div class="section-title">📍 Топ-10 Адресов</div><table><tr><th>Адрес</th><th>Кол-во</th><th>Гл. подтема</th></tr>${htmlAddr}</table></div>
      </div>
    `;
    cont.appendChild(div);
  });
}

function renderDyn(pct, abs) {
  if (pct === 0) return '<span class="dyn-badge" style="background:rgba(148,163,184,0.15);color:#94a3b8;">→ 0</span>';
  const isGood = abs <= 0;
  const cls = isGood ? 'dyn-good' : 'dyn-bad';
  const arrow = abs > 0 ? '↑' : '↓';
  const sign = abs > 0 ? '+' : '';
  return `<span class="dyn-badge ${cls}">${arrow} ${sign}${pct}% (${sign}${abs})</span>`;
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-content').forEach((c,i) => c.classList.toggle('active', i===idx));
}

// === ФУНКЦИЯ ДЛЯ ПОДТЕМ ===
window.toggleSubFacts = function(row, groupIdx, subIdx) {
  row.classList.toggle('expanded');
  const factRow = document.getElementById(`sub-row-${groupIdx}-${subIdx}`);
  const factList = document.getElementById(`sub-list-${groupIdx}-${subIdx}`);
  const icon = document.getElementById(`sub-icon-${groupIdx}-${subIdx}`);
  if (factRow.style.display === 'none') {
    factRow.style.display = 'table-row';
    if(factList) factList.classList.add('show');
    if(icon) icon.style.transform = 'rotate(90deg)';
  } else {
    factRow.style.display = 'none';
    if(factList) factList.classList.remove('show');
    if(icon) icon.style.transform = 'rotate(0deg)';
  }
};

window.toggleFacts = function(row) {
  row.classList.toggle('expanded');
  const factRow = row.nextElementSibling;
  const factList = factRow.querySelector('.fact-list');
  if (factRow.style.display === 'none') {
    factRow.style.display = 'table-row';
    if(factList) factList.classList.add('show');
    row.querySelector('.expand-icon').style.transform = 'rotate(90deg)';
  } else {
    factRow.style.display = 'none';
    if(factList) factList.classList.remove('show');
    row.querySelector('.expand-icon').style.transform = 'rotate(0deg)';
  }
};

function parseDate(val) {
  if (!val) return null;
  let d = val instanceof Date ? val : new Date(val);
  return isNaN(d.getTime()) ? null : d.toISOString().split('T')[0];
}

document.getElementById('exportExcelBtn').onclick = () => {
  if (!rawData.length) { alert('Нет данных для выгрузки'); return; }
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  if (!startDate || !endDate) { alert('Укажите период'); return; }
  const filtered = rawData.filter(r => {
    const d = parseDate(r['Дата (первого взятия в работу)']);
    return d && d >= startDate && d <= endDate && (selectedOmsu.size === 0 || selectedOmsu.has((r['ОМСУ'] || '').trim()));
  });
  if (!filtered.length) { alert('Нет данных за период'); return; }
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(filtered);
  XLSX.utils.book_append_sheet(wb, ws, 'Данные');
  XLSX.writeFile(wb, `export_${startDate}_${endDate}.xlsx`);
};

document.getElementById('exportBtn').onclick = () => {
  if (!currentData) return;
  const css = document.querySelector('style').outerHTML;
  let tabsHtml = '<div class="tabs">';
  let contentHtml = '<div id="tabsContent">';
  
  currentData.forEach((item, i) => {
    tabsHtml += `<button class="tab-btn${i===0?' active':''}" onclick="switchTab(${i})">${item.name} (${item.total})</button>`;
    
    const htmlSub = item.subs.map((s, idx) => `
      <tr class="clickable-row" onclick="toggleSubFacts(this, ${i}, ${idx})" style="cursor:pointer;">
        <td><span class="expand-icon" style="display:inline-block;transition:transform 0.3s;">▶</span>${s.name}</td>
        <td>${s.count}</td>
        <td>${s.pctGroup}%</td>
        <td>${renderDyn(s.dynPct, s.dynAbs)}</td>
      </tr>
      <tr style="display:none;"><td colspan="4" style="padding:0 8px 8px 8px;">
        <div class="fact-list" style="display:none;margin-top:8px;background:#0f172a;border-radius:8px;padding:12px;border:1px solid #334155;">
          <strong style="color:#94a3b8;font-size:11px;display:block;margin-bottom:8px;">📋 Факты в подтеме:</strong>
          ${s.facts.map(f => `<div class="fact-item" style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #334155;"><span style="flex:1;margin-right:12px;">${f[0]}</span><span style="background:#1e293b;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:bold;white-space:nowrap;text-align:center;min-width:30px;">${f[1]}</span></div>`).join('')}
        </div>
      </td></tr>
    `).join('');
    
    const htmlFact = item.facts.map(f => `<tr><td>${f.name}</td><td>${f.count}</td><td>${renderDyn(f.dynPct, f.dynAbs)}</td></tr>`).join('');
    const htmlOmsu = item.omsus.map(o => `<tr><td>${o.name}</td><td>${o.count}</td><td>${renderDyn(o.dynPct, o.dynAbs)}</td><td>${o.mainSub} <small style="color:#94a3b8">(${o.mainSubCnt}, ${o.mainSubPct}%)</small></td></tr>`).join('');
    const htmlMail = item.mails.map(m => `<tr class="clickable-row" onclick="toggleFacts(this)" style="cursor:pointer;"><td><span class="expand-icon" style="display:inline-block;transition:transform 0.3s;">▶</span>${m.email}</td><td>${m.count}</td><td style="color:#94a3b8;font-size:12px;">Нажмите</td></tr><tr style="display:none;"><td colspan="3" style="padding:0;"><div class="fact-list" style="padding:10px;background:#0f172a;border-radius:6px;margin-top:5px;"><strong>Факты:</strong>${m.facts.map(f => `<div class="fact-item"><span>${f[0]}</span><span>${f[1]}</span></div>`).join('')}</div></td></tr>`).join('');
    const htmlAddr = item.addrs.map(a => `<tr><td>${a.address}</td><td>${a.count}</td><td>${a.mainSub} <small style="color:#94a3b8">(${a.mainSubCnt}, ${a.mainSubPct}%)</small></td></tr>`).join('');
    
    contentHtml += `
      <div class="tab-content${i===0?' active':''}" id="tab-${i}">
        <div class="metrics-row">
          <div class="metric-card"><div class="metric-val">${item.total}</div><div class="metric-label">Всего обращений</div></div>
          <div class="metric-card"><div class="metric-val">${renderDyn(Math.round(((item.total-item.compTotal)/Math.max(item.compTotal,1))*100), item.total-item.compTotal)}</div><div class="metric-label">Динамика к периоду</div></div>
          <div class="metric-card"><div class="metric-val">${item.subs.length}</div><div class="metric-label">Подтем</div></div>
          <div class="metric-card"><div class="metric-val">${item.omsus.length}</div><div class="metric-label">ОМСУ</div></div>
        </div>
        <div class="dashboard-grid">
          <div class="section-block"><div class="section-title">📌 Топ-5 Подтем</div><table><tr><th>Подтема</th><th>Кол-во</th><th>%</th><th>Динамика</th></tr>${htmlSub}</table></div>
          <div class="section-block"><div class="section-title">⚠️ Топ-5 Фактов</div><table><tr><th>Факт</th><th>Кол-во</th><th>Динамика</th></tr>${htmlFact}</table></div>
          <div class="section-block"><div class="section-title">🏢 Топ-10 ОМСУ</div><table><tr><th>ОМСУ</th><th>Кол-во</th><th>Динамика</th><th>Гл. подтема</th></tr>${htmlOmsu}</table></div>
          <div class="section-block"><div class="section-title">✉️ Топ-10 Заявителей</div><table><tr><th>Email</th><th>Кол-во</th><th>Факты</th></tr>${htmlMail}</table></div>
          <div class="section-block" style="grid-column:1/-1"><div class="section-title">📍 Топ-10 Адресов</div><table><tr><th>Адрес</th><th>Кол-во</th><th>Гл. подтема</th></tr>${htmlAddr}</table></div>
        </div>
      </div>`;
  });
  
  tabsHtml += '</div>'; contentHtml += '</div>';
  
  const js = `
    function switchTab(idx) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
      document.querySelectorAll('.tab-content').forEach((c,i) => c.classList.toggle('active', i===idx));
    }
    window.toggleFacts = function(row) {
      row.classList.toggle('expanded');
      const factRow = row.nextElementSibling;
      const factList = factRow.querySelector('.fact-list');
      const icon = row.querySelector('.expand-icon');
      if (factRow.style.display === 'none') {
        factRow.style.display = 'table-row';
        if(factList) factList.style.display = 'block';
        if(icon) icon.style.transform = 'rotate(90deg)';
      } else {
        factRow.style.display = 'none';
        if(factList) factList.style.display = 'none';
        if(icon) icon.style.transform = 'rotate(0deg)';
      }
    };
    window.toggleSubFacts = function(row, groupIdx, subIdx) {
      row.classList.toggle('expanded');
      const factRow = row.nextElementSibling;
      const factList = factRow.querySelector('.fact-list');
      const icon = row.querySelector('.expand-icon');
      if (factRow.style.display === 'none') {
        factRow.style.display = 'table-row';
        if(factList) factList.style.display = 'block';
        if(icon) icon.style.transform = 'rotate(90deg)';
      } else {
        factRow.style.display = 'none';
        if(factList) factList.style.display = 'none';
        if(icon) icon.style.transform = 'rotate(0deg)';
      }
    };
  `;
  
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Экспорт Дашборда</title>${css}</head><body style="margin:20px;background:#0b1120;color:#f1f5f9;font-family:sans-serif;"><h2>📊 Дашборд обращений</h2><p>Период: ${currentPeriods.start} - ${currentPeriods.end}</p>${tabsHtml}${contentHtml}<script>${js}<\/script></body></html>`;
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dashboard_${currentPeriods.start}_${currentPeriods.end}.html`;
  a.click();
};

initOmsuDropdown();
</script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</body>
</html>
