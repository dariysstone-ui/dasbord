<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 Дашборд обращений</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>

    :root {
      --bg: #080e1a; --panel: #111827; --card: #1a2436;
      --b: #243044; --bl: #2e3f58;
      --t: #e2eaf6; --tm: #7a90b0; --td: #4a607e;
      --ac: #3b82f6; --ag: rgba(59,130,246,.18);
      --ok: #10b981; --okb: rgba(16,185,129,.14);
      --er: #f43f5e; --erb: rgba(244,63,94,.14);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);font-size:13px;min-height:100vh;padding:16px}
    @media(max-width:600px){body{padding:10px}}
    .wrap{max-width:1680px;margin:0 auto}

    .panel{background:var(--panel);border:1px solid var(--b);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 4px 32px rgba(0,0,0,.35)}
    @media(max-width:600px){.panel{padding:14px;border-radius:12px}}
    .hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
    .hdr h2{font-size:17px;font-weight:700}
    @media(max-width:600px){.hdr h2{font-size:15px}}
    .badge{background:var(--ag);border:1px solid rgba(59,130,246,.35);color:var(--ac);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px}
    .badge.warn{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:#fbbf24}

    /* Form grid — responsive */
    .fg{display:grid;grid-template-columns:repeat(4,1fr) 1.3fr 1.3fr auto;gap:10px;align-items:end}
    @media(max-width:1100px){.fg{grid-template-columns:1fr 1fr}}
    @media(max-width:600px){
      .fg{grid-template-columns:1fr 1fr;gap:8px}
      .fg>div:last-child{grid-column:1/-1}
    }
    label{display:block;margin-bottom:4px;color:var(--tm);font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
    input[type=date]{width:100%;padding:9px 10px;background:var(--card);border:1px solid var(--bl);border-radius:8px;color:var(--t);font-size:13px;transition:border-color .2s}
    @media(max-width:600px){input[type=date]{font-size:14px;padding:11px 10px}}
    input[type=date]:focus{outline:none;border-color:var(--ac)}

    /* Section labels for mobile grouping */
    .fg-section{display:none}
    @media(max-width:600px){
      .fg-section{display:block;grid-column:1/-1;font-size:10px;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;padding-bottom:2px;border-bottom:1px solid var(--b)}
    }

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;transition:all .2s;white-space:nowrap}
    @media(max-width:600px){.btn{padding:12px 18px;font-size:14px}}
    .btn-p{background:var(--ac);color:white}
    .btn-p:hover:not(:disabled){background:#2563eb;box-shadow:0 0 16px rgba(59,130,246,.4)}
    .btn-s{background:var(--ok);color:white}
    .btn-s:hover:not(:disabled){background:#059669}
    .btn-g{background:transparent;color:var(--tm);border:1px solid var(--bl)}
    .btn-g:hover{background:var(--card);color:var(--t)}
    .btn-sm{padding:6px 12px;font-size:11px}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .abar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    @media(max-width:600px){.abar .btn{flex:1;min-width:0}}

    /* Info/warning boxes */
    .infobox{border-radius:8px;padding:10px 14px;margin-top:12px;font-size:12px;line-height:1.6;display:none}
    .infobox.show{display:flex;align-items:flex-start;gap:10px}
    .infobox.tip{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#93c5fd}
    .infobox.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fbbf24}
    .infobox.err{background:var(--erb);border:1px solid rgba(244,63,94,.3);color:#fca5a5}

    /* Progress */
    .pw{margin-top:14px;display:none}
    .pw.on{display:block}
    .pl{display:flex;justify-content:space-between;margin-bottom:6px}
    .pl span{font-size:12px;color:var(--tm)}
    .pl .pct{color:var(--ac);font-weight:700}
    .pb{background:var(--card);border-radius:99px;height:6px;overflow:hidden;border:1px solid var(--b)}
    .pf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--ac),#60a5fa);transition:width .2s ease;box-shadow:0 0 8px rgba(59,130,246,.5);width:0}

    /* OMSU */
    .omf{position:relative}
    .oms{width:100%;padding:9px 10px;background:var(--card);border:1px solid var(--bl);border-radius:8px;color:var(--t);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px;user-select:none}
    .oms:hover{border-color:var(--ac)}
    .omd{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--panel);border:1px solid var(--bl);border-radius:10px;max-height:280px;overflow-y:auto;z-index:500;box-shadow:0 12px 40px rgba(0,0,0,.7);-webkit-overflow-scrolling:touch}
    @media(max-width:600px){.omd{max-height:220px;position:fixed;left:10px;right:10px;top:auto}}
    .omd.show{display:block;animation:drop .15s ease}
    @keyframes drop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .omo{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px}
    @media(max-width:600px){.omo{padding:13px 14px}}
    @media(max-width:600px){.omo input{width:18px;height:18px}}
    @media(max-width:600px){.omo label{font-size:13px}}
    .omo:hover{background:var(--card)}
    .omo input{accent-color:var(--ac);width:14px;height:14px}
    .omo label{margin:0;cursor:pointer;color:var(--t);font-size:12px;text-transform:none;letter-spacing:0;font-weight:400}

    /* Tabs */
    .tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
    @media(max-width:600px){.tabs{gap:5px;margin-bottom:12px}}
    .tabs::-webkit-scrollbar{height:4px}
    .tabs::-webkit-scrollbar-thumb{background:var(--bl);border-radius:2px}
    .tb{background:var(--panel);border:1px solid var(--b);color:var(--tm);padding:7px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;font-size:12px;font-weight:600;transition:all .2s}
    @media(max-width:600px){.tb{padding:9px 12px;font-size:11px}}
    .tb:hover{border-color:var(--bl);color:var(--t)}
    .tb.on{background:var(--ac);color:white;border-color:var(--ac);box-shadow:0 2px 12px rgba(59,130,246,.35)}
    .tc{display:none;animation:fi .25s ease}
    .tc.on{display:block}
    @keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

    .mr{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    @media(max-width:900px){.mr{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.mr{grid-template-columns:repeat(2,1fr);gap:8px}}
    .mc{background:var(--panel);border:1px solid var(--b);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;transition:border-color .2s,box-shadow .2s}
    @media(max-width:600px){.mc{padding:12px;gap:10px;border-radius:10px}}
    .mc:hover{border-color:var(--bl);box-shadow:0 4px 20px rgba(0,0,0,.25)}
    .mi{font-size:22px;opacity:.8;flex-shrink:0}
    .mv{font-size:28px;font-weight:800;color:var(--ac);line-height:1;letter-spacing:-1px}
    @media(max-width:600px){.mv{font-size:22px}}
    .ml{font-size:11px;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}

    .dg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:1000px){.dg{grid-template-columns:1fr}}
    @media(max-width:600px){.dg{gap:10px}}
    .sb{background:var(--panel);border:1px solid var(--b);border-radius:12px;padding:14px;transition:border-color .2s}
    @media(max-width:600px){.sb{padding:12px;border-radius:10px}}
    .sb:hover{border-color:var(--bl)}
    .st{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}

    table{width:100%;border-collapse:collapse;font-size:12px}
    @media(max-width:600px){table{font-size:11px}}
    @media(max-width:480px){.hide-mobile{display:none}}
    th{text-align:left;color:var(--td);font-size:10px;padding:6px 8px;border-bottom:1px solid var(--b);font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s}
    th:hover{color:var(--tm)}
    th.sa::after{content:' ↑';color:var(--ac)}
    th.sd::after{content:' ↓';color:var(--ac)}
    td{padding:7px 8px;border-bottom:1px solid rgba(36,48,68,.6);vertical-align:top}
    tr:last-child td{border-bottom:none}
    .cr{cursor:pointer;transition:background .15s}
    .cr:hover{background:rgba(59,130,246,.04)}
    .ei{display:inline-block;transition:transform .25s;margin-right:6px;font-size:9px;opacity:.5}
    .expanded .ei{transform:rotate(90deg);opacity:1}
    .fr{display:none}
    .fr.show{display:table-row}
    .fin{background:rgba(8,14,26,.6);border-radius:8px;padding:10px 12px;margin:4px 0 6px;border:1px solid var(--b)}
    .fit{color:var(--td);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .fitem{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(36,48,68,.5)}
    .fitem:last-child{border-bottom:none}
    .fn{flex:1;margin-right:12px;color:var(--tm);line-height:1.4}
    .fc{background:var(--card);padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;min-width:28px;text-align:center}

    .db{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
    .dg2{background:var(--okb);color:var(--ok)}
    .dr{background:var(--erb);color:var(--er)}
    .dn{background:rgba(122,144,176,.1);color:var(--tm)}
    .ot{background:var(--card);color:var(--tm);padding:2px 5px;border-radius:4px;font-size:10px;border:1px solid var(--b)}
    .ol{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
    .pbw{display:flex;align-items:center;gap:6px}
    .pbb{flex:1;background:var(--card);border-radius:99px;height:4px;min-width:40px;overflow:hidden}
    .pbf{height:100%;border-radius:99px;background:var(--ac)}
    .cc{position:relative;height:190px;margin-top:8px}
    @media(max-width:600px){.cc{height:140px}}
    .smb{display:inline-flex;align-items:center;padding:5px 10px;background:transparent;border:1px dashed var(--b);border-radius:6px;color:var(--td);font-size:11px;cursor:pointer;transition:all .2s;text-align:center}
    .smb:hover:not(:disabled){border-color:var(--ac);color:var(--ac);background:var(--ag)}
    .smb:disabled{opacity:.3;cursor:not-allowed}
    .pg-wrap{}
    .pg-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:var(--bl);border-radius:3px}
    .srf{position:relative}
    .srs{width:100%;padding:9px 10px;background:var(--card);border:1px solid var(--bl);border-radius:8px;color:var(--t);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px;user-select:none}
    .srs:hover{border-color:var(--ac)}
    .srd{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--panel);border:1px solid var(--bl);border-radius:10px;max-height:260px;overflow-y:auto;z-index:500;box-shadow:0 12px 40px rgba(0,0,0,.7);-webkit-overflow-scrolling:touch}
    @media(max-width:600px){.srd{max-height:200px;position:fixed;left:10px;right:10px;top:auto}}
    .srd.show{display:block;animation:drop .15s ease}
  
  </style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="hdr">
      <h2>📊 Дашборд обращений</h2>
      <span class="badge" id="statusBadge">Онлайн</span>
    </div>

    <div class="fg" style="margin-top:4px">
      <div class="fg-section">📅 Основной период</div>
      <div><label>Период: с</label><input type="date" id="startDate"></div>
      <div><label>Период: по</label><input type="date" id="endDate"></div>
      <div class="fg-section">📅 Период сравнения</div>
      <div><label>Сравнение: с</label><input type="date" id="compStartDate"></div>
      <div><label>Сравнение: по</label><input type="date" id="compEndDate"></div>
      <div class="fg-section">🔍 Фильтры</div>
      <div class="omf">
        <label>Фильтр по ОМСУ</label>
        <div class="oms" onclick="toggleOmsu(event)">
          <span id="omsP">Выберите ОМСУ</span>
          <span style="display:flex;align-items:center;gap:6px">
            <span id="omsClearBtn" onclick="clearOmsu(event)" style="display:none;background:rgba(244,63,94,.2);color:#f43f5e;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">✕</span>
            <span style="opacity:.4;font-size:10px">▼</span>
          </span>
        </div>
        <div class="omd" id="omsDrop"></div>
      </div>
      <div class="srf">
        <label>Фильтр по источнику</label>
        <div class="srs" onclick="toggleSrc(event)">
          <span id="srcP">Все источники</span>
          <span style="display:flex;align-items:center;gap:6px">
            <span id="srcClearBtn" onclick="clearSrc(event)" style="display:none;background:rgba(244,63,94,.2);color:#f43f5e;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">✕</span>
            <span style="opacity:.4;font-size:10px">▼</span>
          </span>
        </div>
        <div class="srd" id="srcDrop"></div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:8px">
        <button class="btn btn-p" id="genBtn" style="width:100%">🚀 Сформировать</button>
      </div>
    </div>

    <div class="pw" id="pw">
      <div class="pl"><span id="pt">Загрузка данных...</span><span class="pct" id="pp">0%</span></div>
      <div class="pb"><div class="pf" id="pf"></div></div>
    </div>
    <div class="abar" id="abar" style="display:none">
      <button class="btn btn-s btn-sm" id="expXls">📥 Выгрузить в Excel</button>
      <button class="btn btn-g btn-sm" id="expHtml">📤 Экспорт HTML</button>
      <span id="dataInfo" style="font-size:11px;color:var(--tm);align-self:center"></span>
    </div>
  </div>

  <div id="dash" style="display:none">
    <div class="tabs" id="tabNav"></div>
    <div id="tabCont"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
const OMSU_LIST=['Долгопрудный','Подольск','Наро-Фоминский','Щелково','Павлово-Посадский','Люберцы','Истра','Мытищи','Домодедово','Химки','Электросталь','Красногорск','Жуковский','Ленинский','Реутов','Дмитровский','Котельники','Богородский','Солнечногорск','Ступино','Егорьевск','Луховицы','Балашиха','Воскресенск','Клин','Одинцовский','Дубна','Сергиево-Посадский','Раменский','Лобня','Рузский','Серпухов','Фрязино','Королёв','Пушкинский','Талдомский','Кашира','Коломна','Черноголовка','Лосино-Петровский','Чехов','Зарайск','Серебряные Пруды','Шатура','Власиха','Шаховская','Лыткарино','Орехово-Зуевский','Можайский','Краснознаменск','Волоколамский','Лотошино','Бронницы','Звездный городок','Молодежный','Восход'];
let selOmsu=new Set(), selSrc=new Set(), curData=null, curPer=null;
let renderedTabs=new Set(), charts={}, lazyD=null, lazyDy=null, lazyDyComp=null;


// ═══════════════════════════════════
// PROGRESS
// ═══════════════════════════════════
const $ = id => document.getElementById(id);
function prog(pct,txt) { $('pf').style.width=pct+'%'; $('pp').textContent=Math.round(pct)+'%'; if(txt) $('pt').textContent=txt; }
function showProg(t){ $('pw').classList.add('on'); prog(0,t); }
function hideProg(){ $('pw').classList.remove('on'); }
const delay=ms=>new Promise(r=>setTimeout(r,ms));

// ═══════════════════════════════════
// OMSU
// ═══════════════════════════════════
function initOmsu() {
  $('omsDrop').innerHTML=OMSU_LIST.slice().sort().map(o=>{
    const id=`o-${o.replace(/[\s']+/g,'-')}`;
    return `<div class="omo" onclick="togO('${o.replace(/'/g,"\\'")}',event)"><input type="checkbox" id="${id}"><label for="${id}">${o}</label></div>`;
  }).join('');
}
function toggleOmsu(e){e.stopPropagation();$('omsDrop').classList.toggle('show')}
function togO(o,e){e.stopPropagation();const c=$(`o-${o.replace(/[\s']+/g,'-')}`);if(c.checked)selOmsu.add(o);else selOmsu.delete(o);updO()}
function updO(){
  const n=selOmsu.size;
  $('omsP').textContent=n===0?'Выберите ОМСУ':n===1?[...selOmsu][0]:`Выбрано: ${n}`;
  const cb=$('omsClearBtn');if(cb)cb.style.display=n>0?'':'none';
}
window.clearOmsu=function(e){
  e.stopPropagation();
  selOmsu.clear();
  document.querySelectorAll('.omd input[type=checkbox]').forEach(c=>c.checked=false);
  updO();
};
document.addEventListener('click',e=>{
  if(!e.target.closest('.omf'))$('omsDrop').classList.remove('show');
  if(!e.target.closest('.srf'))$('srcDrop').classList.remove('show');
});

const SRC_LIST=['ПОС','Добродел','Инцидент','ЕДС','МСЭД','Почта губернатора','ОНФ','Мы рядом','ППМО'];
function initSrc(){
  $('srcDrop').innerHTML=SRC_LIST.map(s=>{
    const id=`src-${s.replace(/\s+/g,'-')}`;
    return`<div class="omo" onclick="togSrc('${s}',event)"><input type="checkbox" id="${id}"><label for="${id}">${s}</label></div>`;
  }).join('');
}
function toggleSrc(e){e.stopPropagation();$('srcDrop').classList.toggle('show');}
function togSrc(s,e){
  e.stopPropagation();
  const cb=$(`src-${s.replace(/\s+/g,'-')}`);
  if(cb.checked)selSrc.add(s);else selSrc.delete(s);
  updSrc();
}
function updSrc(){
  const n=selSrc.size;
  $('srcP').textContent=n===0?'Все источники':n===1?[...selSrc][0]:`Выбрано: ${n}`;
  const cb=$('srcClearBtn');if(cb)cb.style.display=n>0?'':'none';
}
window.clearSrc=function(e){
  e.stopPropagation();
  selSrc.clear();
  document.querySelectorAll('.srd input[type=checkbox]').forEach(c=>c.checked=false);
  updSrc();
};

document.addEventListener('click',e=>{
  if(!e.target.closest('.omf'))$('omsDrop').classList.remove('show');
  if(!e.target.closest('.srf'))$('srcDrop').classList.remove('show');
});


function initSrc(){
  $('srcDrop').innerHTML=SRC_LIST.map(s=>{
    const id=`src-${s.replace(/\s+/g,'-')}`;
    return`<div class="omo" onclick="togSrc('${s}',event)"><input type="checkbox" id="${id}"><label for="${id}">${s}</label></div>`;
  }).join('');
}
function toggleSrc(e){e.stopPropagation();$('srcDrop').classList.toggle('show');}
function togSrc(s,e){
  e.stopPropagation();
  const cb=$(`src-${s.replace(/\s+/g,'-')}`);
  if(cb.checked)selSrc.add(s);else selSrc.delete(s);
  updSrc();
}
function updSrc(){
  const n=selSrc.size;
  $('srcP').textContent=n===0?'Все источники':n===1?[...selSrc][0]:`Выбрано: ${n}`;
  const cb=$('srcClearBtn');if(cb)cb.style.display=n>0?'':'none';
}
window.clearSrc=function(e){
  e.stopPropagation();
  selSrc.clear();
  document.querySelectorAll('.srd input[type=checkbox]').forEach(c=>c.checked=false);
  updSrc();
};

// ═══════════════════════════════════
// ═══════════════════════════════════
// PROGRESS
// ═══════════════════════════════════

function prog(pct,txt) { $('pf').style.width=pct+'%'; $('pp').textContent=Math.round(pct)+'%'; if(txt) $('pt').textContent=txt; }
function showProg(t){ $('pw').classList.add('on'); prog(0,t); }

function rdyn(pct,abs){
  if(pct===0&&abs===0)return'<span class="db dn">→ 0</span>';
  const cls=abs<=0?'dg2':'dr',ar=abs>0?'↑':'↓',sg=abs>0?'+':'';
  return`<span class="db ${cls}">${ar} ${sg}${pct}%<span style="opacity:.6;font-weight:400"> (${sg}${abs})</span></span>`;
}
const esc=s=>String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');

window.doSort=function(th,ci,type){
  const tb=th.closest('table').querySelector('tbody');
  const rows=[...tb.querySelectorAll('tr.dr2')];
  const asc=th.classList.contains('sa');
  th.closest('thead').querySelectorAll('th').forEach(t=>t.classList.remove('sa','sd'));
  th.classList.add(asc?'sd':'sa');
  rows.sort((a,b)=>{
    const va=a.cells[ci]?.dataset.val||'',vb=b.cells[ci]?.dataset.val||'';
    const na=type==='num'?(parseFloat(va)||0):va.toLowerCase();
    const nb=type==='num'?(parseFloat(vb)||0):vb.toLowerCase();
    return asc?(na>nb?1:-1):(na<nb?1:-1);
  });
  rows.forEach(r=>{tb.appendChild(r);const n=r.nextElementSibling;if(n?.classList.contains('fr'))tb.appendChild(n);});
};
window.togExp=function(row,id){row.classList.toggle('expanded');$(id)?.classList.toggle('show')};

const PAGE=10;
function _getHiddenRows(tbl){return tbl?[...tbl.querySelectorAll('tr.mr2')]:[]}
function _updPagBtns(wrap){
  const tbl=wrap.querySelector('table');
  const all=_getHiddenRows(tbl);
  if(!all.length)return;
  const vis=all.filter(r=>r.style.display!=='none').length;
  const total=all.length;
  const remaining=total-vis;
  const btnP=wrap.querySelector('.pg-plus');
  const btnM=wrap.querySelector('.pg-minus');
  const btnC=wrap.querySelector('.pg-collapse');
  if(btnP){btnP.textContent='▼ +10'+(remaining>0?' (ещё '+remaining+')':'');btnP.disabled=remaining<=0;}
  if(btnM){btnM.style.display=vis>0?'':'none';}
  if(btnC){btnC.style.display=vis>0?'':'none';}
}
window.pgPlus=function(btn){
  const wrap=btn.closest('.pg-wrap');
  const tbl=wrap?.querySelector('table');
  if(!tbl)return;
  let shown=0;
  for(const r of _getHiddenRows(tbl)){
    if(r.style.display==='none'){r.style.display='';shown++;if(shown>=PAGE)break;}
  }
  _updPagBtns(wrap);
};
window.pgMinus=function(btn){
  const wrap=btn.closest('.pg-wrap');
  const tbl=wrap?.querySelector('table');
  if(!tbl)return;
  const vis=[..._getHiddenRows(tbl)].filter(r=>r.style.display!=='none').reverse();
  let hidden=0;
  for(const r of vis){
    r.style.display='none';
    const nxt=r.nextElementSibling;
    if(nxt&&nxt.classList.contains('fr')){nxt.classList.remove('show');r.classList.remove('expanded');}
    hidden++;if(hidden>=PAGE)break;
  }
  _updPagBtns(wrap);
};
window.pgCollapse=function(btn){
  const wrap=btn.closest('.pg-wrap');
  const tbl=wrap?.querySelector('table');
  if(!tbl)return;
  _getHiddenRows(tbl).forEach(r=>{r.style.display='none';const nxt=r.nextElementSibling;if(nxt&&nxt.classList.contains('fr')){nxt.classList.remove('show');r.classList.remove('expanded');}});
  _updPagBtns(wrap);
};

function mkTable(cols,body){
  const ths=cols.map((h,i)=>`<th onclick="doSort(this,${i},'${h.t||'num'}')">${h.l}</th>`).join('');
  return`<table><thead><tr>${ths}</tr></thead><tbody>${body}</tbody></table>`;
}

function renderTab(item,idx,daily){
  if(renderedTabs.has(idx))return;
  renderedTabs.add(idx);
  const el=$(`tab-${idx}`);if(!el)return;
  const dp=Math.round(((item.total-item.compTotal)/Math.max(item.compTotal,1))*100);

  const SUB_INIT=10;

  }).join('');
  const subRemaining=item.subs.length-SUB_INIT;
  const subMoreBtn=subRemaining>0?`<div class="pg-btns">
    <button class="smb pg-plus" onclick="pgPlus(this)">▼ +10 (ещё ${subRemaining})</button>
    <button class="smb pg-minus" onclick="pgMinus(this)" style="display:none">▲ -10</button>
    <button class="smb pg-collapse" onclick="pgCollapse(this)" style="display:none">▲▲ Свернуть всё</button>

  const subR=subRows;

  function pgBtns(remaining,total){
    if(total<=0)return'';
    return`<div class="pg-btns">
      <button class="smb pg-plus" onclick="pgPlus(this)">▼ +10 (ещё ${remaining})</button>
      <button class="smb pg-minus" onclick="pgMinus(this)" style="display:none">▲ -10</button>
      <button class="smb pg-collapse" onclick="pgCollapse(this)" style="display:none">▲▲ Свернуть всё</button>
    </div>`;
  }
  function moreR(arr,init,fn){
    const v=arr.slice(0,init).map(fn).join('');
    const hidden=arr.length>init?arr.slice(init).map(x=>{const t=fn(x);return t.replace(/^<tr[^>]*>/,'<tr class="dr2 mr2" style="display:none">');}).join(''):'';
    const remaining=arr.length-init;
    const b=remaining>0?pgBtns(remaining,arr.length-init):'';
    return{r:v+hidden,b};
  }

  const fct=moreR(item.facts,I_F,f=>`<tr class="dr2"><td data-val="${esc(f.name)}">${f.name}</td><td data-val="${f.count}">${f.count.toLocaleString('ru')}</td><td data-val="${f.dynAbs}">${rdyn(f.dynPct,f.dynAbs)}</td></tr>`);
  const oms=moreR(item.omsus,I_O,o=>`<tr class="dr2"><td data-val="${esc(o.name)}">${o.name}</td><td data-val="${o.count}">${o.count.toLocaleString('ru')}</td><td data-val="${o.dynAbs}">${rdyn(o.dynPct,o.dynAbs)}</td><td data-val="${esc(o.mainSub)}">${o.mainSub} <small style="color:var(--tm)">(${o.mainSubCnt}, ${o.mainSubPct}%)</small></td></tr>`);

  const mailR=item.mails.slice(0,10).map((m,i)=>{
    const oh=m.omsus.length>0?`<div class="ol">${m.omsus.map(o=>`<span class="ot">${o}</span>`).join('')}</div>`:'';
    const fh=m.facts.length>0?m.facts.map(f=>`<div class="fitem"><span class="fn">${f[0]}</span><span class="fc">${f[1]}</span></div>`).join(''):'<span style="color:var(--td);font-size:11px">Нет данных</span>';

  }).join('');
  const mailMoreBtn=item.mails.length>10?`<div class="pg-btns"><button class="smb pg-plus" onclick="pgPlus(this)">▼ +10 (ещё ${item.mails.length-10})</button><button class="smb pg-minus" onclick="pgMinus(this)" style="display:none">▲ -10</button><button class="smb pg-collapse" onclick="pgCollapse(this)" style="display:none">▲▲ Свернуть всё</button></div>`:'';
  const mailHiddenRows=item.mails.slice(10).map((m,i)=>{
    const i2=i+10;
    const oh=m.omsus.length>0?`<div class="ol">${m.omsus.map(o=>`<span class="ot">${o}</span>`).join('')}</div>`:'';
    const fh=m.facts.length>0?m.facts.map(f=>`<div class="fitem"><span class="fn">${f[0]}</span><span class="fc">${f[1]}</span></div>`).join(''):'<span style="color:var(--td);font-size:11px">Нет данных</span>';
    return`<tr class="dr2 cr mr2" style="display:none" onclick="togExp(this,'mf-${idx}-${i2}')">
      <td data-val="${esc(m.email)}" style="max-width:240px"><span class="ei">►</span><span style="word-break:break-all">${m.email}</span>${oh}</td>
      <td data-val="${m.count}" style="text-align:center;font-weight:700">${m.count}</td></tr>
    <tr class="fr" id="mf-${idx}-${i2}"><td colspan="2" style="padding:2px 8px 8px 24px"><div class="fin"><div class="fit">📋 Факты</div>${fh}</div></td></tr>`;
  }).join('');
  const mailRFull=mailR+mailHiddenRows;

  const cid=`ch-${idx}`;
  el.innerHTML=`
    <div class="mr">
      <div class="mc"><div class="mi">📋</div><div><div class="mv">${item.total.toLocaleString('ru')}</div><div class="ml">Всего обращений</div></div></div>
      <div class="mc"><div class="mi">📈</div><div><div class="mv" style="font-size:17px;margin-top:3px">${rdyn(dp,item.total-item.compTotal)}</div><div class="ml">Динамика к периоду</div></div></div>
      <div class="mc"><div class="mi">🗂️</div><div><div class="mv">${item.subs.length}</div><div class="ml">Подтем</div></div></div>
      <div class="mc"><div class="mi">🏢</div><div><div class="mv">${item.omsus.length}</div><div class="ml">ОМСУ</div></div></div>
    </div>
    <div style="margin-bottom:16px"><div class="sb"><div class="st"><span>📅 Динамика по дням</span></div><div class="cc"><canvas id="${cid}"></canvas></div></div></div>
    <div class="dg">
      <div class="sb"><div class="st"><span>📌 Топ-10 Подтем из ${item.subs.length}</span></div><div class="pg-wrap">${mkTable([{l:'Подтема',t:'str'},{l:'Кол-во'},{l:'%'},{l:'Динамика'}],subR)}${subMoreBtn}</div></div>
      <div class="sb"><div class="st"><span>⚠️ Топ-10 Фактов из ${item.facts.length}</span></div><div class="pg-wrap">${mkTable([{l:'Факт',t:'str'},{l:'Кол-во'},{l:'Динамика'}],fct.r)}${fct.b}</div></div>
      <div class="sb"><div class="st"><span>🏢 Топ-10 ОМСУ из ${item.omsus.length}</span></div><div class="pg-wrap">${mkTable([{l:'ОМСУ',t:'str'},{l:'Кол-во'},{l:'Динамика'},{l:'Гл. подтема',t:'str'}],oms.r)}${oms.b}</div></div>
      <div class="sb"><div class="st"><span>✉️ Топ-10 Заявителей из ${item.mails.length}</span></div><div class="pg-wrap">${mkTable([{l:'Email / ОМСУ',t:'str'},{l:'Кол-во'}],mailRFull)}${mailMoreBtn}</div></div>
      <div class="sb" style="grid-column:1/-1"><div class="st"><span>📍 Топ-10 Адресов из ${item.addrs.length}</span></div><div class="pg-wrap">${mkTable([{l:'Адрес',t:'str'},{l:'Кол-во'},{l:'Гл. подтема',t:'str'}],adr.r)}${adr.b}</div></div>

  setTimeout(()=>{
    const canvas=$(cid);if(!canvas)return;
    if(charts[cid])charts[cid].destroy();

    const days=Object.keys(daily).sort();
    const vals=days.map(d=>daily[d]?.[item.name]||0);

    // Build top-1 subtopic per day from daily data
    const topSubPerDay={}; // date -> {sub, count}
    if(curPer&&lazyDy){
      // We use the raw daily agg data stored in lazyDy
      // lazyDy[date][sg] = count (already filtered to this sg by buildDaily on server)

        borderWidth:1.5,borderDash:[4,3],
        order:2
      });
    }

    charts[cid]=new Chart(canvas,{type:'line',
      data:{labels:days,datasets},
      options:{responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},

          },

          y:{grid:{color:'rgba(36,48,68,.4)'},ticks:{color:'#4a607e',font:{size:10}},beginAtZero:true}
        }
      }
    });
  },60);
}

function renderDash(data,daily){
  const nav=$('tabNav'),cont=$('tabCont');
  nav.innerHTML='';cont.innerHTML='';
  renderedTabs.clear();lazyD=data;lazyDy=daily;
  data.forEach((item,i)=>{
    const btn=document.createElement('button');
    btn.className='tb'+(i===0?' on':'');
    btn.textContent=`${item.name} (${item.total.toLocaleString('ru')})`;
    btn.onclick=()=>switchTab(i);
    nav.appendChild(btn);
    const div=document.createElement('div');
    div.className='tc'+(i===0?' on':'');div.id=`tab-${i}`;cont.appendChild(div);
  });
  renderTab(data[0],0,daily);
}
function switchTab(i){
  document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.querySelectorAll('.tc').forEach((c,j)=>c.classList.toggle('on',j===i));
  renderTab(lazyD[i],i,lazyDy);
}

function saveS(){
  try{
    sessionStorage.setItem('dash_online', JSON.stringify({
      s:$('startDate').value, e:$('endDate').value,
      cs:$('compStartDate').value, ce:$('compEndDate').value,
      omsu:[...selOmsu], src:[...selSrc]
    }));
  }catch(_){}
}
function loadS(){
  try{
    const c=JSON.parse(sessionStorage.getItem('dash_online')||'null');
    if(!c)return;
    if(c.s)  $('startDate').value=c.s;
    if(c.e)  $('endDate').value=c.e;
    if(c.cs) $('compStartDate').value=c.cs;
    if(c.ce) $('compEndDate').value=c.ce;
    if(c.omsu?.length){
      selOmsu=new Set(c.omsu);
      c.omsu.forEach(o=>{const cb=$(`o-${o.replace(/[\s']+/g,'-')}`);if(cb)cb.checked=true;});
      updO();
    }
    if(c.src?.length){
      selSrc=new Set(c.src);
      c.src.forEach(s=>{const cb=$(`src-${s.replace(/\s+/g,'-')}`);if(cb)cb.checked=true;});
      updSrc();
    }
  }catch(_){}
}

// GENERATE — calls Vercel API
// ═══════════════════════════════════
$('genBtn').onclick=async()=>{
  const s=$('startDate').value, e=$('endDate').value;
  const cs=$('compStartDate').value, ce=$('compEndDate').value;
  if(!s||!e||!cs||!ce){alert('Заполните все 4 даты');return;}

  saveS();
  $('genBtn').disabled=true;
  $('dash').style.display='none';
  $('abar').style.display='none';
  showProg('Запрос к серверу...');

  try{
    prog(15,'Загрузка данных с сервера...');

    const resp=await fetch('/api',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({start:s, end:e, compStart:cs, compEnd:ce, omsuFilter:[...selOmsu], sourceFilter:[...selSrc]})
    });

    prog(65,'Получение ответа...');

    if(!resp.ok){
      const err=await resp.json().catch(()=>({error:resp.statusText}));
      throw new Error(err.error||`Ошибка сервера: ${resp.status}`);
    }

    const json=await resp.json();
    if(!json.data?.length){alert('Нет данных за указанный период');return;}

    prog(90,'Формирование дашборда...');
    await delay(0);

    curData=json.data;
    curPer={start:s, end:e, compStart:cs, compEnd:ce, omsu:[...selOmsu], src:[...selSrc]};
    lazyDy=json.daily||{};
    lazyDyComp=json.dailyComp||{};

    const mainCnt=(json.counts?.main||0).toLocaleString('ru');
    const compCnt=(json.counts?.comp||0).toLocaleString('ru');
    const years=(json.yearsLoaded||[]).join(', ');
    $('dataInfo').textContent=`Основной: ${mainCnt} строк · Сравнение: ${compCnt} строк · Годы: ${years}`;

    prog(100,'Готово!');
    await delay(150);

    renderDash(json.data, json.daily||{});
    $('dash').style.display='block';
    $('abar').style.display='flex';
    $('dash').scrollIntoView({behavior:'smooth', block:'start'});

  }catch(err){
    alert('Ошибка: '+err.message);
    console.error(err);
  }finally{
    hideProg();
    $('genBtn').disabled=false;
  }
};

$('expXls').onclick=async()=>{
  if(!curPer){alert('Нет данных');return;}
  const btn=$('expXls');
  btn.disabled=true;btn.textContent='⏳ Загрузка строк...';
  try{
    // Request raw rows from API (separate endpoint action)
    const resp=await fetch('/api',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        start:curPer.start,end:curPer.end,
        compStart:curPer.compStart,compEnd:curPer.compEnd,
        omsuFilter:curPer.omsu||[],
        sourceFilter:curPer.src||[],
        exportRaw:true
      })
    });
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error||'Ошибка сервера');}
    const json=await resp.json();
    const rawRows=json.rawRows||[];
    if(!rawRows.length){alert('Нет данных для выгрузки');return;}

    btn.textContent='⏳ Формирование Excel...';
    if(typeof XLSX==='undefined'){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
    }
    // Fixed column order — must match original CSV exactly
    const COLS=[
      'Порядковый номер','Номер ЕЦУР','Номер в источнике',
      'Дата (первого взятия в работу)','Направление','Синт. группа',
      'Факт','Подтема','Статус','Куратор','Исполнитель','ОМСУ',
      'Источник','Спам (да/нет)','Тип сообщения - 0 проблемы, 1 - предложения',
      'Описание','Почта заявителя','Управляющая компания','Адрес',
      'Район','Населенный пункт','Улица','Дом','Внутренний Id'
    ];
    // Build array-of-arrays: header row + data rows (no extra columns)
    const aoa=[COLS];
    for(const row of rawRows){
      aoa.push(COLS.map(col=>row[col]??''));
    }
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    XLSX.utils.book_append_sheet(wb,ws,'Данные');
    XLSX.writeFile(wb,`export_${curPer.start}_${curPer.end}.xlsx`);
  }catch(err){alert('Ошибка: '+err.message);console.error(err);}
  finally{btn.disabled=false;btn.textContent='📥 Выгрузить в Excel';}
};

$('expHtml').onclick=()=>{
  if(!curData||!curPer)return;
  const css=`<style>${document.querySelector('style').textContent}</style>`;
  const{start,end}=curPer;
  let nav='<div class="tabs">',cont='<div id="tabCont">';
  curData.forEach((item,i)=>{
    nav+=`<button class="tb${i===0?' on':''}" onclick="sw(${i})">${item.name} (${item.total.toLocaleString('ru')})</button>`;
    const dp=Math.round(((item.total-item.compTotal)/Math.max(item.compTotal,1))*100);
    const sR=item.subs.map((s,i)=>{
      const fh=s.facts&&s.facts.length>0?s.facts.map(f=>`<div class="fitem"><span class="fn">${f[0]}</span><span class="fc">${f[1]}</span></div>`).join(''):'<span style="color:var(--td);font-size:11px">Нет данных</span>';
      const hid=i>=10?' class="dr2 mr2 cr" style="display:none"':' class="dr2 cr"';
      return`<tr${hid} onclick="togExpE(this,'esf-${i}-${i}')">
        <td><span class="ei">▶</span>${s.name}</td><td>${s.count}</td><td>${s.pctGroup}%</td><td>${rdyn(s.dynPct,s.dynAbs)}</td></tr>
      <tr${i>=10?' class="fr mr2" style="display:none"':' class="fr"'} id="esf-${i}-${i}"><td colspan="4" style="padding:2px 8px 8px 24px"><div class="fin"><div class="fit">📋 Факты</div>${fh}</div></td></tr>`;
    }).join('');
    const sRbtn=item.subs.length>10?`<div class="pg-btns"><button class="smb pg-plus" onclick="pgPlus(this)">▼ +10 (ещё ${item.subs.length-10})</button><button class="smb pg-minus" onclick="pgMinus(this)" style="display:none">▲ -10</button><button class="smb pg-collapse" onclick="pgCollapse(this)" style="display:none">▲▲ Свернуть всё</button></div>`:'';
    const fR=item.facts.map((f,i)=>`<tr${i>=10?' class="mr2" style="display:none"':''}><td>${f.name}</td><td>${f.count}</td><td>${rdyn(f.dynPct,f.dynAbs)}</td></tr>`).join('');
    const fRbtn=item.facts.length>10?`<div class="pg-btns"><button class="smb pg-plus" onclick="pgPlus(this)">▼ +10 (ещё ${item.facts.length-10})</button><button class="smb pg-minus" onclick="pgMinus(this)" style="display:none">▲ -10</button><button class="smb pg-collapse" onclick="pgCollapse(this)" style="display:none">▲▲ Свернуть всё</button></div>`:'';
    const oR=item.omsus.map((o,i)=>`<tr${i>=10?' class="mr2" style="display:none"':''}><td>${o.name}</td><td>${o.count}</td><td>${rdyn(o.dynPct,o.dynAbs)}</td><td>${o.mainSub}</td></tr>`).join('');
    const oRbtn=item.omsus.length>10?`<div class="pg-btns"><button class="smb pg-plus" onclick="pgPlus(this)">▼ +10 (ещё ${item.omsus.length-10})</button><button class="smb pg-minus" onclick="pgMinus(this)" style="display:none">▲ -10</button><button class="smb pg-collapse" onclick="pgCollapse(this)" style="display:none">▲▲ Свернуть всё</button></div>`:'';
    const aR=item.addrs.map((a,i)=>`<tr${i>=10?' class="mr2" style="display:none"':''}><td>${a.address}</td><td>${a.count}</td><td>${a.mainSub}</td></tr>`).join('');
    const aRbtn=item.addrs.length>10?`<div class="pg-btns"><button class="smb pg-plus" onclick="pgPlus(this)">▼ +10 (ещё ${item.addrs.length-10})</button><button class="smb pg-minus" onclick="pgMinus(this)" style="display:none">▲ -10</button><button class="smb pg-collapse" onclick="pgCollapse(this)" style="display:none">▲▲ Свернуть всё</button></div>`:'';
    const mR=item.mails.map((m,mi)=>{
      const oh=m.omsus.length>0?`<div class="ol">${m.omsus.map(o=>`<span class="ot">${o}</span>`).join('')}</div>`:'';
      const fh=m.facts.length>0?m.facts.map(f=>`<div class="fitem"><span class="fn">${f[0]}</span><span class="fc">${f[1]}</span></div>`).join(''):'<span style="color:var(--td);font-size:11px">Нет данных</span>';
      return`<tr class="cr${mi>=10?' mr2':''}" style="${mi>=10?'display:none':''}" onclick="togExpE(this,'emf-${i}-${mi}')">
        <td style="max-width:280px"><span class="ei">▶</span><span style="word-break:break-all">${m.email}</span>${oh}</td>
        <td style="text-align:center;font-weight:700">${m.count}</td></tr>
      <tr${mi>=10?' class="fr mr2" style="display:none"':' class="fr"'} id="emf-${i}-${mi}"><td colspan="2" style="padding:2px 8px 8px 24px"><div class="fin"><div class="fit">📋 Факты</div>${fh}</div></td></tr>`;
    }).join('');
    const mRbtn=item.mails.length>10?`<div class="pg-btns"><button class="smb pg-plus" onclick="pgPlus(this)">▼ +10 (ещё ${item.mails.length-10})</button><button class="smb pg-minus" onclick="pgMinus(this)" style="display:none">▲ -10</button><button class="smb pg-collapse" onclick="pgCollapse(this)" style="display:none">▲▲ Свернуть всё</button></div>`:'';
    cont+=`<div class="tc${i===0?' on':''}" id="tab-${i}">
      <div class="mr">
        <div class="mc"><div class="mi">📋</div><div><div class="mv">${item.total.toLocaleString('ru')}</div><div class="ml">Обращений</div></div></div>
        <div class="mc"><div class="mi">📈</div><div><div class="mv" style="font-size:17px;margin-top:3px">${rdyn(dp,item.total-item.compTotal)}</div><div class="ml">Динамика</div></div></div>
        <div class="mc"><div class="mi">🗂️</div><div><div class="mv">${item.subs.length}</div><div class="ml">Подтем</div></div></div>
        <div class="mc"><div class="mi">🏢</div><div><div class="mv">${item.omsus.length}</div><div class="ml">ОМСУ</div></div></div>
      </div>
      <div style="margin-bottom:16px"><div class="sb"><div class="st"><span>📅 Динамика по дням</span></div><div class="cc"><canvas id="ech-${i}"></canvas></div></div></div>
      <div class="dg">
        <div class="sb"><div class="st"><span>📌 Топ-10 Подтем из ${item.subs.length}</span></div><div class="pg-wrap"><table><thead><tr><th>Подтема</th><th>Кол-во</th><th>%</th><th>Динамика</th></tr></thead><tbody>${sR}</tbody></table>${sRbtn}</div></div>
        <div class="sb"><div class="st"><span>⚠️ Топ-10 Фактов из ${item.facts.length}</span></div><div class="pg-wrap"><table><thead><tr><th>Факт</th><th>Кол-во</th><th>Динамика</th></tr></thead><tbody>${fR}</tbody></table>${fRbtn}</div></div>
        <div class="sb"><div class="st"><span>🏢 Топ-10 ОМСУ из ${item.omsus.length}</span></div><div class="pg-wrap"><table><thead><tr><th>ОМСУ</th><th>Кол-во</th><th>Динамика</th><th>Гл. подтема</th></tr></thead><tbody>${oR}</tbody></table>${oRbtn}</div></div>
        <div class="sb"><div class="st"><span>✉️ Топ-10 Заявителей из ${item.mails.length}</span></div><div class="pg-wrap"><table><thead><tr><th>Email</th><th>Кол-во</th></tr></thead><tbody>${mR}</tbody></table>${mRbtn}</div></div>
        <div class="sb" style="grid-column:1/-1"><div class="st"><span>📍 Топ-10 Адресов из ${item.addrs.length}</span></div><div class="pg-wrap"><table><thead><tr><th>Адрес</th><th>Кол-во</th><th>Гл. подтема</th></tr></thead><tbody>${aR}</tbody></table>${aRbtn}</div></div>
      </div></div>`;
  });
  nav+='</div>';cont+='</div>';
  // Embed all chart data as a JS array in the exported HTML
  // Build chart data: main + comp periods, per group
  const mainDays=Object.keys(lazyDy).sort();
  const compDays2=Object.keys(lazyDyComp||{}).sort();
  const chartDataJson=JSON.stringify(curData.map(item=>{
    const mainVals=mainDays.map(d=>lazyDy[d]?.[item.name]||0);
    const compVals=mainDays.map((_,i)=>{const cd=compDays2[i];return cd?(lazyDyComp[cd]?.[item.name]||0):null;});
    const hasComp=compVals.some(v=>v!=null);
    return{name:item.name,topSub:item.subs[0]?.name||'',labels:mainDays,mainVals,compVals,hasComp};
  }));
  const expChartScript=`
    var CHART_DATA=${chartDataJson};
    function initCharts(){
      if(typeof Chart==='undefined'){setTimeout(initCharts,100);return;}
      CHART_DATA.forEach(function(d,ci){
        var canvas=document.getElementById('ech-'+ci);
        if(!canvas)return;
        var ds=[{
          label:'Основной период',data:d.mainVals,
          borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',
          fill:true,tension:.4,pointRadius:d.labels.length>90?0:2,pointHoverRadius:5,borderWidth:2.5
        }];
        if(d.hasComp){ds.push({
          label:'Период сравнения',data:d.compVals,
          borderColor:'rgba(148,163,184,.5)',backgroundColor:'transparent',
          fill:false,tension:.4,pointRadius:0,pointHoverRadius:4,
          borderWidth:1.5,borderDash:[4,3]
        });}
        new Chart(canvas,{type:'line',data:{labels:d.labels,datasets:ds},
          options:{responsive:true,maintainAspectRatio:false,
            interaction:{mode:'index',intersect:false},
            plugins:{
              legend:{display:d.hasComp,labels:{color:'#7a90b0',font:{size:10},boxWidth:12,padding:10}},
              tooltip:{backgroundColor:'rgba(17,24,39,.95)',borderColor:'#243044',borderWidth:1,
                titleColor:'#7a90b0',bodyColor:'#e2eaf6',
                callbacks:{
                  title:function(t){return[t[0].label,d.topSub?'Топ подтема: '+d.topSub:''].filter(Boolean);},
                  label:function(t){return t.dataset.label+': '+(t.raw!=null?t.raw:'-');}
                }
              }
            },
            scales:{
              x:{grid:{color:'rgba(36,48,68,.4)'},ticks:{color:'#4a607e',maxTicksLimit:14,font:{size:10}}},
              y:{grid:{color:'rgba(36,48,68,.4)'},ticks:{color:'#4a607e',font:{size:10}},beginAtZero:true}
            }
          }
        });
      });
    }
    document.addEventListener('DOMContentLoaded',initCharts);
  `;

const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Дашборд ${start}–${end}</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>${css}</head><body><div class="wrap"><div style="padding:16px 0 4px"><h2 style="color:white">📊 Дашборд обращений</h2><p style="color:var(--tm);font-size:12px;margin-top:4px">Период: ${start} — ${end}</p></div>${nav}${cont}</div><script>function sw(i){document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('on',j===i));document.querySelectorAll('.tc').forEach((c,j)=>c.classList.toggle('on',j===i));}function togExpE(row,id){row.classList.toggle('expanded');var fr=document.getElementById(id);if(fr)fr.classList.toggle('show');}const PAGE=10;function pgPlus(btn){const w=btn.closest('.pg-wrap');if(!w)return;const all=[...w.querySelectorAll('table tr.mr2')].filter(r=>!r.classList.contains('fr'));let n=0;for(const r of all){if(r.style.display==='none'){r.style.display='';var nxt=r.nextElementSibling;if(nxt&&nxt.classList.contains('fr'))nxt.style.display='none';n++;if(n>=PAGE)break;}}updPg(w);}function pgMinus(btn){const w=btn.closest('.pg-wrap');if(!w)return;const vis=[...w.querySelectorAll('table tr.mr2')].filter(r=>r.style.display!=='none'&&!r.classList.contains('fr')).reverse();let n=0;for(const r of vis){r.style.display='none';var nxt=r.nextElementSibling;if(nxt&&nxt.classList.contains('fr')){nxt.style.display='none';nxt.classList.remove('show');r.classList.remove('expanded');}n++;if(n>=PAGE)break;}updPg(w);}function pgCollapse(btn){const w=btn.closest('.pg-wrap');if(!w)return;w.querySelectorAll('table tr.mr2').forEach(r=>{r.style.display='none';if(r.classList.contains('fr')){r.classList.remove('show');}else{r.classList.remove('expanded');}});updPg(w);}function updPg(w){const all=[...w.querySelectorAll('table tr.mr2')].filter(r=>!r.classList.contains('fr'));const vis=all.filter(r=>r.style.display!=='none').length;const rem=all.length-vis;const bp=w.querySelector('.pg-plus');const bm=w.querySelector('.pg-minus');const bc=w.querySelector('.pg-collapse');if(bp){bp.textContent='\u25bc +10'+(rem>0?' (\u0435\u0449\u0451 '+rem+')':'');bp.disabled=rem<=0;}if(bm)bm.style.display=vis>0?'':'none';if(bc)bc.style.display=vis>0?'':'none';}${expChartScript}<\/script></body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`dashboard_${start}_${end}.html`;a.click();
};
